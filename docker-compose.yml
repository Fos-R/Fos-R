services:
  source:
    image: fosr/generation
    build: .
    cap_add:
      - NET_RAW
      - NET_BIND_SERVICE
    networks:
      default:
        ipv4_address: 192.168.4.2
    command: /bin/sh -c "tcpdump -i eth0 -c 15 -w /tmp/capture.pcap & cargo run --release -- online"

  destination:
    image: fosr/generation
    cap_add:
      - NET_RAW
      - NET_BIND_SERVICE
    networks:
      default:
        ipv4_address: 192.168.4.3

# Create a network to force the ip address of both containers
networks:
  default:
    ipam:
      config:
        - subnet: 192.168.4.0/24
